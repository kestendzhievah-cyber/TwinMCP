# This file intentionally redirects to docker-compose.yml.
# Docker Compose v2 reads compose.yml first, so we include docker-compose.yml
# to avoid maintaining two separate configurations.
#
# Usage:
#   docker compose up -d
#
# The canonical config is in docker-compose.yml which includes:
# - healthchecks on all services
# - env_file for secrets
# - environment variable interpolation
# - pgAdmin behind dev profile

include:
  - docker-compose.yml
